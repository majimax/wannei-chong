  </style>
</head>

    <div class="footer"><p>🦅 公司是个动物园，你是哪种社畜？</p><p>职场MBTI人格测试</p><p>制作：Robin · 玩出名堂</p></div>

  "ESFJ":{animal:"🐯",name:"华南虎",alias:"「打工人星座」：天生的领袖，但经常独自承担所有的KPI",knowledge:"华南虎型打工人是办公室里最操心的物种。他们天生具有强烈的责任感和社交天赋，会议室里的气氛、项目推进顺不顺利、同事今天怎么没来上班——全在他们心里装着。这种人最见不得别人不开心，一旦发现团队有人情绪不对，立刻放下手里的活儿去嘘寒问暖，堪称职场第一好同事。\n\n工作风格上，他们是典型的"领头虎"——不仅自己要干得好，还要确保所有人都干得好。开会时永远是最积极发言的那个，团建时永远是最忙前忙后的那个。但问题来了：华南虎把所有事都往自己身上扛。时间久了，这只老虎累得皮包骨头，嘴上说着"没事没事"，心里已经开起了离职演唱会。",traits:[{label:"闪光时刻",text:"团队有人情绪崩溃时，第一个站出来说"没事，有我在""},{label:"崩溃瞬间",text:"辛苦做的方案被同事抢功，对方还到处说是自己的功劳"}],bestPartner:"INTP",mineField:"你人这么好，帮帮忙呗",quote:"没事没事，我来扛。"},
  "ESTP":{animal:"🦏",name:"北部平原黑犀牛",alias:"「打工人星座」：强势但不野蛮，怼起人来比犀牛冲起来还猛",knowledge:"北部平原黑犀牛型打工人说话直接得像冲锋的犀牛，不喜欢绕弯子，更不喜欢听废话——开会如果有人讲了三分钟还没到重点，犀牛型同事已经开始翻白眼了。\n\n这类人天生对"现实"有着敏锐的嗅觉。老板说"这个项目要有战略思维"，他们心里想的是"你就说这个月能不能完成KPI吧"。执行力超强，是那种老板最喜欢、但同事有时候会受不了的类型。",traits:[{label:"闪光时刻",text:"项目卡壳了，所有人面面相觑，他直接冲上去三分钟搞定"},{label:"崩溃瞬间",text:"老板开了一天会，全是空话，最后说"我们再讨论讨论""}],bestPartner:"ISFJ",mineField:"你能不能情商高一点",quote:"你就说这个月能不能完成KPI吧。"},
  "ISFP":{animal:"🐟",name:"蓝鳍金枪鱼",alias:"「打工人星座」：安静优雅地游着，突然就成了别人嘴里的寿司",knowledge:"蓝鳍金枪鱼型打工人是办公室里最安静的美男子/美少女。他们不争不抢，不爱出风头，永远在自己的工位上默默做事。开会时很少主动发言，不是因为没想法，而是觉得"反正说了也没人听"。\n\n这类人有着惊人的审美天赋和艺术直觉。做PPT配色永远比别人的好看，写文案永远比别人有感觉。但问题是——他们太不善于展示自己了。明明方案是自己熬夜做的，讲方案的时候却结结巴巴，眼神飘忽。",traits:[{label:"闪光时刻",text:"做出的作品让所有人Wow了一声，然后就没有然后了"},{label:"崩溃瞬间",text:"被点名当众发言，前面三个同事已经讲了三十分钟"}],bestPartner:"ENFJ",mineField:"你这么内向，在职场很吃亏的",quote:"我讲得不好，大家多担待……"},
  "ISTP":{animal:"🦅",name:"河燕鸥",alias:"「打工人星座」：独立自由，但栖息地越来越少，在工位上就像在笼子里",knowledge:"河燕鸥型打工人是公司里的"独行侠"。他们不爱扎堆，中午一个人吃饭，下班一个人走，参加团建全程像个融入不进群体的透明人。\n\n这类人动手能力极强，是那种电脑坏了能自己拆开修、家里装修能自己画图纸的狠人。但河燕鸥型员工最大的问题是：他们不爱解释。你问他们方案怎么做，他们说"就这样做啊"；你问他们项目进度，他们说"快好了"。不会讲故事的员工永远比会讲故事的员工吃亏。",traits:[{label:"闪光时刻",text:"所有技术问题到了他那都迎刃而解"},{label:"崩溃瞬间",text:"周一早上九点被拉去开不需要发言的头脑风暴会"}],bestPartner:"ESTJ",mineField:"强迫他参加"破冰游戏"",quote:"就这样做啊。"},
  "ESFP":{animal:"🦅",name:"菲律宾鹰",alias:"「打工人星座」：社交达人，气场全开，但钱包永远空的",knowledge:"菲律宾鹰型打工人是办公室里的"明星物种"。他们走到哪里都是焦点，说话永远有人听，笑声永远最响亮。这种人天生具有表演天赋，开会发言像在演话剧，做汇报像在开演唱会。\n\n但问题来了——菲律宾鹰太爱"外面"的世界了。他们心思活络，但也容易浮躁。而且他们是典型的"今朝有酒今朝醉"，工资到手先享受——最新款手机必须买，下个月演唱会必须去。结果工作三年，银行卡余额像个笑话。",traits:[{label:"闪光时刻",text:"客户来公司考察，他一个人hold住全场"},{label:"崩溃瞬间",text:"连续一个月做重复性工作，感觉自己的灵魂在枯萎"}],bestPartner:"ISTJ",mineField:"你要不要考虑攒点钱",quote:"今晚有局吗？人越多越好！"},
  "ESTJ":{animal:"🐘",name:"亚洲象",alias:"「打工人星座」：稳重可靠，但树大招风，背的锅比鼻子还长",knowledge:"亚洲象型打工人是公司的中流砥柱，是老板最放心的那种员工。他们靠谱得像个永远不会出错的机器——答应周三交的东西，周三早上十点就发过来了，还顺便检查了两遍错别字。\n\n这类人极度注重规则和秩序，公司的流程制度他们比HR还熟。开会时他们永远是那个记录要点的人，也是那个追着别人要交付物的人。但亚洲象最让人心疼的地方在于：他们太能扛了。时间久了，发现自己的工资已经三年没涨了，而部门里最会说漂亮话的新人，升职了。",traits:[{label:"闪光时刻",text:"公司出了乱子，所有人慌得不行，只有他冷静地说"按流程来""},{label:"崩溃瞬间",text:"按流程做了所有事，最后背锅的还是自己"}],bestPartner:"ENFP",mineField:"差不多就行了",quote:"几点？我马上到。"},
  "ISTJ":{animal:"🐊",name:"扬子鳄",alias:"「打工人星座」：低调务实，闷声干活，偶尔露个牙你就完了",knowledge:"扬子鳄型打工人是办公室里最低调的狠角色。他们话不多，每天按时上下班，工位上永远整整齐齐，电脑文件夹命名规范得像强迫症晚期。你甚至感觉不到他们的存在——直到有一天你急中生乱，发现只有他能救你。\n\n这类人有着近乎偏执的责任心和原则性。他们信奉"要么不做，要么做到最好"。但扬子鳄有一个致命弱点：他们太不懂得争取自己的利益。升职加薪永远等老板"看见"，老板有时候是真的看不见——毕竟这只鳄鱼太安静了。",traits:[{label:"闪光时刻",text:"项目出了大问题，老板在绝望中想到了他，然后奇迹发生了"},{label:"崩溃瞬间",text:"被老板说"你工作挺稳定的，就是缺少亮点""}],bestPartner:"ESFP",mineField:"当面说他的工作"无聊"或者"谁都能做"",quote:"我已经做好了。"},
  "ISFJ":{animal:"🦌",name:"华南梅花鹿",alias:"「打工人星座」：温暖体贴，但一被惊吓就跑，跑完还觉得是自己不对",knowledge:"华南梅花鹿型打工人是办公室里最温暖的存在。他们的工位上永远有小零食，桌角永远放着给同事准备的纸巾，借支笔从来不说"不"。这种人不显山不露水，但每个人的入职第一周都会记得他的好。\n\n梅花鹿最让人心疼的特质：他们太容易自责了。项目出了问题，哪怕主要责任不在他们，他们也会想"是不是我哪里没做好"。最可怜的是，他们不敢表达需求。干了三年想加薪，想了半天开口说出来的却是"如果您方便的话……其实……也没关系"。",traits:[{label:"闪光时刻",text:"新同事入职第一天，只有他记得问一句"还适应吗""},{label:"崩溃瞬间",text:"自己的方案被改得面目全非，对方还说"帮你改好了""}],bestPartner:"ESTP",mineField:"你这么好说话，一定会帮忙的对吧？",quote:"如果您方便的话……其实……也没关系。"},
  "ENFJ":{animal:"🦌",name:"藏羚羊",alias:"「打工人星座」：魅力领袖，迁徙精神——永远在跳槽的路上",knowledge:"藏羚羊型打工人是天生的激励者和理想主义者。他们相信"改变世界"这件事，哪怕自己只是一个普通员工。每次开会听到"我们的使命是……"他们眼里都有光。\n\n他们的沟通能力是MBTI里最强的。能把deadline说成"共同愿景"，能把加班说成"热血青春"。但问题来了——藏羚羊的理想主义是一把双刃剑。他们是天生的"连续创业者"，永远在迁徙，永远在寻找下一片水草丰美的地方。",traits:[{label:"闪光时刻",text:"团队士气低落，他一句话就能让大家重新燃起来"},{label:"崩溃瞬间",text:"发现老板说的"以人为本"其实是"以加班为本""}],bestPartner:"INTJ",mineField:"你想太多了"或者"别那么理想主义"",quote:"我们的使命是——让这个世界变得更好！"},
  "ENTP":{animal:"🦅",name:"冠斑犀鸟",alias:"「打工人星座」：脑洞清奇，口才好，但嘴欠起来能把整个会议带偏",knowledge:"冠斑犀鸟型打工人是办公室里最有趣的物种，也是老板最头疼的类型。他们的脑子里永远有十万个点子，开会时别人还在想"这个问题怎么解决"，他们已经想出了七种方案。\n\n这类人是天生的辩论高手。但冠斑犀鸟型员工最怕两件事：无聊和被管。一旦工作变得重复枯燥，这只犀鸟就会开始"搞事情"——脑子里想一些有的没的，拉着同事聊，一聊就是一个下午。",traits:[{label:"闪光时刻",text:"项目陷入死胡同，他灵光一闪提出了一个所有人都没想到的方案"},{label:"崩溃瞬间",text:"被安排做重复性的执行工作，感觉自己的智商在被侮辱"}],bestPartner:"ISTJ",mineField:"限制他的发言时间或者让他"少想多做"",quote:"我有个更NB的想法——"},
  "INFJ":{animal:"🐦",name:"朱鹮",alias:"「打工人星座」：稀有而珍贵，神秘优雅，但经常觉得自己不该存在于这个格子间",knowledge:"朱鹮型打工人是办公室里最特别的存在。他们安静、独立、有着深邃的内心世界，工位上可能放着一本尼采或者一行禅师。这种人有一种与生俱来的"气场"，你说不清他哪里特别，但就是会觉得"这是个有故事的人"。\n\n他们是最有同理心的同事。能敏锐地察觉到别人的情绪变化——哪怕你只是轻轻叹了口气，他都会过一会儿悄悄发来一条消息："你还好吗？"",traits:[{label:"闪光时刻",text:"团队有人情绪崩溃时，他一句"我懂"就能让对方哭出来"},{label:"崩溃瞬间",text:"发现自己的善良被当作软弱，好说话被当作好欺负"}],bestPartner:"ENFP",mineField:"被贴上"温柔"标签然后被反复消耗",quote:"我懂。"},
  "INFP":{animal:"🐢",name:"太平洋丽龟",alias:"「打工人星座」：入职第一天想的不是KPI，是我在这里能成为更好的自己吗",knowledge:"太平洋丽龟型打工人天生带着一股"这个世界欠我一个理解"的气场。这类人上班永远带着使命感，但这个使命跟公司战略八竿子打不着——他们的使命是"做有意义的事"。\n\nINFP是那种开会时被问到"这个项目的核心价值是什么"会突然眼睛发亮的人，也是那种因为同事一句"你这个创意有点理想化了"能难过一整天的人。太平洋丽龟在职场里游啊游，想找到一个愿意在沙滩上产卵的温暖海岸，结果发现沙滩都盖成了写字楼。",traits:[{label:"闪光时刻",text:"客户说"你这个文案让我想起了初恋""},{label:"崩溃瞬间",text:"周一早会领导说"我们要把创意拉回地面""}],bestPartner:"ENFJ",mineField:"这个工作很简单，你随便做做就行",quote:"我在想一个很好的idea……等我准备好了再说。"},
  "INTP":{animal:"🐉",name:"白鲟",alias:"「打工人星座」：你的脑子在思考宇宙真理，你的肉体在处理Excel表格",knowledge:"白鲟型打工人明明被困在一口叫做"职场"的井里，心里装的是整个海洋。这类人上班时身体坐在工位上，灵魂大概在研究"为什么PPT的动画效果是这样设计的而不是那样的"。\n\nINTP的大脑是台永动机，唯一的关闭按钮被设在了"下班后"。他们看系统、看流程、看人性的弱点，就是不太会看办公室政治。白鲟，沉在深海，最怕的是水面上的喧嚣——比如每周一早上八点准时响起的视频会议。",traits:[{label:"闪光时刻",text:"系统崩溃所有人急得团团转，INTP悠悠地说"我昨天就发现这个bug了""},{label:"崩溃瞬间",text:"被拉进一个"就简单对一下"结果开了两小时的会议"}],bestPartner:"INTJ",mineField:"你这个PPT做得不错，但能不能再活泼一点",quote:"这个我早想到了，就是懒得做。"},
  "INTJ":{animal:"🐎",name:"普氏野马",alias:"「打工人星座」：你的孤独不是没有朋友，是在等一个配得上跟你对话的大脑",knowledge:"普氏野马型打工人上班不是为了赚钱，是为了证明"你们的方案都是垃圾"。开会时永远在内心翻白眼，除非有人说出让他们眼前一亮的观点。他们脑子里住着一个横着走的帝王，制定战略比呼吸还自然，唯一的bug是——懒得跟你解释为什么你是错的。\n\n久而久之，普氏野马发现自己在办公室成了稀有物种——不是被孤立，是主动选择了孤立。毕竟，找到一个能跟上自己脑回路的人，比找对象还难。",traits:[{label:"闪光时刻",text:"项目崩盘所有人抓瞎时，INTJ缓缓掏出一份Plan B"},{label:"崩溃瞬间",text:"被要求"大家集思广益一下""}],bestPartner:"INFJ",mineField:"我觉得这个方案还不错",quote:"这件事有两个问题……算了，懒得说。"},
  "ENFP":{animal:"🐦",name:"黄胸鹀",alias:"「打工人星座」：你是办公室的气氛组组长，也是自己人生的间歇性失踪人口",knowledge:"黄胸鹀型打工人上班像一场即兴表演，创意多到可以拯救三个广告公司，拖延症重到可以拖垮三个项目DDL。ENFP是那种周一跟你说"我有个绝妙的idea！"周五跟你说"不好意思我突然对另一个方向更感兴趣了"的人。\n\n黄胸鹀以前满大街都是，现在得去保护区才能看到——就像ENFP，以前每个公司都有好几个，现在都转型去做自由职业了，因为打卡这件事真的会要了他们的命。",traits:[{label:"闪光时刻",text:"脑暴会议上ENFP一开口，全场从昏昏欲睡变成眼睛发光"},{label:"崩溃瞬间",text:"周五下午六点被告知"这个任务周一要""}],bestPartner:"ISTJ",mineField:"你就照着上次那个模板做就行",quote:"我有个绝妙的idea！"},
  "ENTJ":{animal:"🐢",name:"亚洲山龟",alias:"「打工人星座」：你不是在解决问题，你是在解决提出问题的人",knowledge:"亚洲山龟型打工人走路带风，说话斩钉截铁，开会时别人还在铺垫"我觉得可能如果要是有机会的话"，他们已经说完了"就这么干，不行我来兜底"。\n\nENTJ是天生的将军型人格，擅长把混乱的局面收拾成一条清晰的流水线。但ENTJ也有软肋——他们太专注于向前冲，有时候会忽略路边受伤的队友。更要命的是，当他们发现自己的路线图走不通时，面子问题会成为压垮他们的最后一根稻草。",traits:[{label:"闪光时刻",text:"项目陷入僵局，ENTJ站出来说"都别慌，跟我走""},{label:"崩溃瞬间",text:"制定的完美计划因为队友而崩盘"}],bestPartner:"INFP",mineField:"要不我们先讨论一下？",quote:"就这么干，不行我来兜底。"}
};
var currentQuestion=0,answers=[];
function startQuiz(){
  document.getElementById("coverPage").style.display="none";
  document.getElementById("quizPage").style.display="block";
  document.getElementById("resultPage").style.display="none";
  currentQuestion=0;answers=[];
  showQuestion();
}
function showQuestion(){
  var q=questions[currentQuestion];
  document.getElementById("sectionBadge").textContent=q.section;
  document.getElementById("questionText").textContent="Q"+(currentQuestion+1)+"/20｜"+q.q;
  var c=document.getElementById("optionsContainer");c.innerHTML="";
  q.options.forEach(function(opt,i){
    var b=document.createElement("button");b.className="option";
    b.textContent=String.fromCharCode(65+i)+". "+opt;
    b.onclick=function(){selectOption(i)};
    c.appendChild(b);
  });
  updateProgress();
}
function selectOption(i){
  answers.push(i);
  currentQuestion++;
  if(currentQuestion<questions.length){showQuestion();}else{showResult();}
}
function updateProgress(){
  var p=Math.round((currentQuestion+1)/questions.length*100);
  document.getElementById("progressText").textContent="Q"+(currentQuestion+1)+"/20";
  document.getElementById("progressPercent").textContent=p+"%";
  document.getElementById("progressFill").style.width=p+"%";
}
function calculateResult(){
  var E=0,I=0,S=0,N=0,T=0,F=0,J=0,P=0;
  answers.forEach(function(a){
    if(a===0||a===1){E++;}else{I++;}
    if(a===0||a===1){S++;}else{N++;}
    if(a===0||a===2){T++;}else{F++;}
    if(a===0||a===3){J++;}else{P++;}
  });
  return(E>I?"E":"I")+(S>N?"S":"N")+(T>F?"T":"F")+(J>P?"J":"P");
}
function showResult(){
  document.getElementById("coverPage").style.display="none";
  document.getElementById("quizPage").style.display="none";
  document.getElementById("resultPage").style.display="block";
  var type=calculateResult(),data=results[type];
  document.getElementById("resultAnimal").textContent=data.animal;
  document.getElementById("resultType").textContent=type;
  document.getElementById("resultName").textContent=data.name;
  document.getElementById("resultAlias").textContent=data.alias;
  var kd=data.knowledge.split("\n\n");
  document.getElementById("resultKnowledge").textContent=kd[0];
  document.getElementById("resultDescription").textContent=kd[1]||"";
  var tl=document.getElementById("traitList");tl.innerHTML="";
  data.traits.forEach(function(t){
    var d=document.createElement("div");d.className="trait-item";
    d.innerHTML='<span class="trait-bullet">'+t.label+'：</span><span>'+t.text+"</span>";
    tl.appendChild(d);
  });
  document.getElementById("bestPartner").textContent=data.bestPartner;
  document.getElementById("mineField").textContent=data.mineField;
  document.getElementById("resultQuote").textContent=data.quote;
}
function shareResult(){
  var type=document.getElementById("resultType").textContent;
  var animal=document.getElementById("resultAnimal").textContent;
  var name=document.getElementById("resultName").textContent;
  var alias=document.getElementById("resultAlias").textContent;
  var text="🦅 公司是个动物园，你是哪种社畜？\n\n我的结果是："+type+" · "+animal+" "+name+"\n"+alias+"\n\n👉 戳链接测试你的打工人属性！";
  navigator.clipboard.writeText(text).then(function(){showToast()});
}
function retryQuiz(){startQuiz()}
function showToast(){
  var t=document.getElementById("toast");t.classList.add("show");
  setTimeout(function(){t.classList.remove("show")},2000);
}
</script>
