<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>你是哪种濒危动物｜动物版MBTI测试</title>
  <meta name="description" content="12道有趣的心理测试题，测出你是16种濒危动物中的哪一种。看看你是哪种稀有物种！">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --primary:#2D5A3D;
      --primary-dark:#1A3A25;
      --secondary:#4A7C59;
      --accent:#E85D4C;
      --bg:#F5F0E8;
      --bg-result:#1a2e1a;
      --text:#2C2C2C;
      --card:#FFFFFF;
      --border:#E0DCD4;
    }
    body{
      font-family:'Noto Sans SC',sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      justify-content:center;
      padding:20px;
    }
    .container{max-width:480px;width:100%}

    /* === Cover Page === */
    .cover-page{
      text-align:center;
      padding:60px 20px;
      animation:fadeIn .6s ease-out;
    }
    .cover-emoji{font-size:90px;margin-bottom:20px}
    .cover-title{
      font-size:26px;font-weight:700;
      color:var(--primary);margin-bottom:16px;line-height:1.4;
    }
    .cover-desc{
      font-size:15px;color:#666;line-height:1.7;margin-bottom:24px;
    }
    .cover-tags{
      display:flex;justify-content:center;gap:8px;
      margin-bottom:32px;flex-wrap:wrap;
    }
    .cover-tag{
      background:var(--primary);color:white;
      padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;
    }
    .cover-note{
      font-size:13px;color:#888;margin-bottom:32px;
      background:#f0ebe3;padding:12px 16px;border-radius:10px;
    }
    .start-btn{
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      color:white;border:none;
      padding:16px 48px;font-size:18px;font-weight:500;
      border-radius:50px;cursor:pointer;
      transition:transform .2s,box-shadow .2s;
      box-shadow:0 4px 15px rgba(45,90,61,.3);
    }
    .start-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(45,90,61,.4)}
    .start-btn:active{transform:translateY(0)}

    /* === Quiz Page === */
    .quiz-page{display:none;animation:slideIn .4s ease-out}
    .progress-bar{
      position:fixed;top:0;left:0;right:0;
      background:var(--card);
      padding:12px 20px;
      box-shadow:0 2px 10px rgba(0,0,0,.05);
      z-index:100;
    }
    .progress-info{
      display:flex;justify-content:space-between;align-items:center;
      max-width:480px;margin:0 auto;font-size:14px;color:#666;
    }
    .progress-track{
      height:6px;background:var(--border);border-radius:3px;
      margin-top:8px;overflow:hidden;
    }
    .progress-fill{
      height:100%;
      background:linear-gradient(90deg,var(--primary),var(--secondary));
      border-radius:3px;transition:width .3s ease;
    }
    .quiz-content{padding:80px 0 40px}
    .section-badge{
      display:inline-block;
      background:var(--secondary);color:white;
      padding:4px 14px;border-radius:20px;font-size:12px;
      margin-bottom:16px;
    }
    .question-text{
      font-size:20px;font-weight:500;
      color:var(--text);margin-bottom:28px;line-height:1.6;
    }
    .options{display:flex;flex-direction:column;gap:12px}
    .option{
      background:var(--card);
      border:2px solid var(--border);border-radius:12px;
      padding:16px 20px;font-size:15px;line-height:1.5;
      cursor:pointer;transition:all .2s ease;text-align:left;
    }
    .option:hover{border-color:var(--secondary);transform:scale(1.02);box-shadow:0 4px 12px rgba(0,0,0,.08)}
    .option:active{transform:scale(.98)}

    /* === Result Page === */
    .result-page{
      display:none;
      text-align:center;
      padding:30px 0 40px;
      animation:fadeIn .6s ease-out;
      background:var(--bg-result);
      color:white;
      margin:-20px;padding:30px 20px 40px;
      border-radius:0;
    }
    .result-emoji{font-size:100px;margin-bottom:12px;animation:bounceIn .6s ease-out}
    .result-type{
      display:inline-block;
      background:rgba(255,255,255,.15);
      color:white;
      padding:6px 24px;border-radius:20px;
      font-size:28px;font-weight:700;letter-spacing:3px;
      margin-bottom:12px;
      border:2px solid rgba(255,255,255,.3);
    }
    .result-animal-name{font-size:24px;font-weight:700;margin-bottom:4px;color:#fff}
    .result-slogan{font-size:15px;color:rgba(255,255,255,.7);margin-bottom:28px;font-style:italic}

    .result-card{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.15);
      border-radius:16px;padding:20px;margin-bottom:16px;
      text-align:left;
    }
    .result-card-title{
      font-size:13px;font-weight:700;
      color:var(--accent);margin-bottom:10px;
      display:flex;align-items:center;gap:6px;
    }
    .result-card-content{
      font-size:15px;line-height:1.75;color:rgba(255,255,255,.85);
    }

    .share-section{margin-top:24px}
    .share-btn{
      background:linear-gradient(135deg,var(--accent),#d44a3a);
      color:white;border:none;
      padding:14px 32px;font-size:16px;font-weight:500;
      border-radius:50px;cursor:pointer;
      transition:transform .2s,box-shadow .2s;
      box-shadow:0 4px 15px rgba(232,93,76,.3);
    }
    .share-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(232,93,76,.4)}
    .retry-btn{
      background:transparent;color:rgba(255,255,255,.8);
      border:2px solid rgba(255,255,255,.3);
      padding:12px 28px;font-size:15px;border-radius:50px;
      cursor:pointer;margin-top:12px;margin-left:12px;
      transition:all .2s;
    }
    .retry-btn:hover{background:rgba(255,255,255,.1);color:white}

    .footer{margin-top:40px;font-size:12px;color:rgba(255,255,255,.4);line-height:1.8}

    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
    @keyframes bounceIn{0%{transform:scale(.3);opacity:0}50%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}

    .toast{
      position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
      background:#333;color:white;
      padding:12px 24px;border-radius:8px;font-size:14px;
      opacity:0;transition:opacity .3s;z-index:200;
    }
    .toast.show{opacity:1}

    @media(max-width:480px){
      .cover-emoji{font-size:70px}
      .cover-title{font-size:22px}
      .question-text{font-size:18px}
      .result-emoji{font-size:80px}
    }
  </style>
</head>
<body>
<div class="container">
  <!-- Cover -->
  <div class="cover-page" id="coverPage">
    <div class="cover-emoji">🐾</div>
    <h1 class="cover-title">你是哪种濒危动物</h1>
    <p class="cover-desc">12道有趣的心理测试题<br>测出你对应的16种濒危动物</p>
    <div class="cover-tags">
      <span class="cover-tag">能量 E/I</span>
      <span class="cover-tag">感知 S/N</span>
      <span class="cover-tag">判断 T/F</span>
      <span class="cover-tag">生活 J/P</span>
    </div>
    <div class="cover-note">每题选 A 或 B，选完自动跳转下一题</div>
    <button class="start-btn" id="startBtn">开始测试 →</button>
  </div>

  <!-- Quiz -->
  <div class="quiz-page" id="quizPage">
    <div class="progress-bar">
      <div class="progress-info">
        <span id="progressText">Q1/12</span>
        <span id="progressPercent">8%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:8%"></div>

    </div>
    <div class="quiz-content">
      <div class="section-badge" id="sectionBadge">能量倾向 E/I</div>
      <p class="question-text" id="questionText"></p>
      <div class="options" id="optionsContainer"></div>
    </div>
  </div>

  <!-- Result -->
  <div class="result-page" id="resultPage">
    <div class="result-emoji" id="resultEmoji">🐧</div>
    <div class="result-type" id="resultType">INFP</div>
    <p class="result-animal-name" id="resultName"></p>
    <p class="result-slogan" id="resultSlogan"></p>

    <div class="result-card">
      <div class="result-card-title">🔖 一句话描述</div>
      <div class="result-card-content" id="resultDesc"></div>
    </div>

    <div class="result-card">
      <div class="result-card-title">📚 详细解读</div>
      <div class="result-card-content" id="resultDetail"></div>
    </div>

    <div class="share-section">
      <button class="share-btn" id="shareBtn">📤 分享结果</button>
      <button class="retry-btn" id="retryBtn">🔄 再测一次</button>
    </div>

    <div class="footer">
      <p>🐾 你是哪种濒危动物 · 动物版MBTI</p>
      <p>制作：Robin · 玩出名堂</p>
    </div>
  </div>
</div>

<div class="toast" id="toast">已复制到剪贴板！</div>

<script>

  'EI': '能量倾向 E/I',
  'SN': '感知方式 S/N',
  'TF': '判断方式 T/F',
  'JP': '生活方式 J/P'

// ========== 状态 ==========
var currentQuestion = 0;
var answers = [];

// ========== 事件绑定 ==========
document.getElementById('startBtn').addEventListener('click', startQuiz);
document.getElementById('shareBtn').addEventListener('click', shareResult);
document.getElementById('retryBtn').addEventListener('click', retryQuiz);

// ========== 流程 ==========
function startQuiz() {
  document.getElementById('coverPage').style.display = 'none';
  document.getElementById('quizPage').style.display = 'block';
  document.getElementById('resultPage').style.display = 'none';
  currentQuestion = 0;
  answers = [];
  showQuestion();
}

function showQuestion() {
  var q = questions[currentQuestion];
  document.getElementById('sectionBadge').textContent = dimensionLabels[q.dimension];
  document.getElementById('questionText').textContent = 'Q' + (currentQuestion + 1) + '/12\uFF1A' + q.text;

  var container = document.getElementById('optionsContainer');
  container.innerHTML = '';

  q.options.forEach(function(opt) {
    var btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = '<strong>' + opt.letter + '.</strong> ' + opt.text;
    btn.addEventListener('click', (function(score) {
      return function() { selectOption(score); };
    })(opt.score));
    container.appendChild(btn);
  });

  updateProgress();
}

function selectOption(score) {
  answers.push(score);
  currentQuestion++;

  if (currentQuestion < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function updateProgress() {
  var p = Math.round((currentQuestion + 1) / questions.length * 100);
  document.getElementById('progressText').textContent = 'Q' + (currentQuestion + 1) + '/12';
  document.getElementById('progressPercent').textContent = p + '%';
  document.getElementById('progressFill').style.width = p + '%';
}

function calculateResult() {
  var dims = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

  answers.forEach(function(score) {
    dims[score]++;
  });

  var EI = dims.E >= dims.I ? 'E' : 'I';
  var SN = dims.S >= dims.N ? 'S' : 'N';
  var TF = dims.T >= dims.F ? 'T' : 'F';
  var JP = dims.J >= dims.P ? 'J' : 'P';

  return EI + SN + TF + JP;
}

function showResult() {
  document.getElementById('coverPage').style.display = 'none';
  document.getElementById('quizPage').style.display = 'none';
  document.getElementById('resultPage').style.display = 'block';

  var type = calculateResult();
  var data = results[type] || results['ENTP'];

  document.getElementById('resultEmoji').textContent = data.animal;
  document.getElementById('resultType').textContent = type;
  document.getElementById('resultName').textContent = data.name;
  document.getElementById('resultSlogan').textContent = '\u300C' + data.slogan + '\u300D';
  document.getElementById('resultDesc').textContent = data.description;
  document.getElementById('resultDetail').textContent = data.detail;
}

function shareResult() {
  var type = document.getElementById('resultType').textContent;
  var name = document.getElementById('resultName').textContent;
  var slogan = document.getElementById('resultSlogan').textContent;
  var emoji = document.getElementById('resultEmoji').textContent;

  var text = '\uD83D\uDC3E \u4F60\u662F\u54EA\u79CD\u6F5C\u5371\u52A8\u7269\uFF1F\n\n' +
    '\u6211\u7684\u7ED3\u679C\u662F\uFF1A' + type + ' \u00B7 ' + emoji + ' ' + name + '\n' +
    slogan + '\n\n' +
    '\u270B \u6233\u94FE\u63A5\u6D4B\u8BD5\u4F60\u662F\u54EA\u79CD\u7A00\u6709\u7269\u79CD\uFF01';

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() { showToast(); })['catch'](function() {
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  var textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.opacity = '0';
  document.body.appendChild(textarea);
  textarea.select();
  document.execCommand('copy');
  document.body.removeChild(textarea);
  showToast();
}

function retryQuiz() {
  startQuiz();
}

function showToast() {
  var t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}
</script>
